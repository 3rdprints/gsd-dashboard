name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: ${{ matrix.os }} release build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - blacksmith-6vcpu-macos-latest
          - blacksmith-2vcpu-windows-2025
          - blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release workflow requires a semantic version tag like v1.2.3; got ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

      - name: Sync version from tag
        shell: bash
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_VERSION#v}"
          echo "Syncing version to ${VERSION} from tag ${TAG_VERSION}"
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Configure macOS universal targets
        if: matrix.os == 'blacksmith-6vcpu-macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Ubuntu Tauri packages
        if: matrix.os == 'blacksmith-2vcpu-ubuntu-2404'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Check doc-comment coverage
        run: npm run docs:check

      - name: Build frontend
        run: npm run build

      - name: Build macOS universal DMG
        if: matrix.os == 'blacksmith-6vcpu-macos-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles app,dmg

      - name: Assert macOS universal bundle
        if: matrix.os == 'blacksmith-6vcpu-macos-latest'
        shell: bash
        run: |
          universal_dmg="$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -type f -name '*universal*.dmg' -print -quit || true)"
          if [ -n "${universal_dmg}" ]; then
            echo "macOS universal DMG found: ${universal_dmg}"
            exit 0
          fi
          app_path="$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' -print -quit)"
          scripts/release/assert-macos-universal.sh "${app_path}"

      - name: Build Windows installers
        if: matrix.os == 'blacksmith-2vcpu-windows-2025'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles msi,nsis

      - name: Build Linux installers
        if: matrix.os == 'blacksmith-2vcpu-ubuntu-2404'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles deb,appimage,rpm

      - name: Collect macOS artifacts
        if: matrix.os == 'blacksmith-6vcpu-macos-latest'
        shell: bash
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/universal-apple-darwin/release/bundle -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.sig' \) -exec cp {} release-artifacts/ \;

      - name: Collect Windows artifacts
        if: matrix.os == 'blacksmith-2vcpu-windows-2025'
        shell: bash
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/release/bundle -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.sig' \) -exec cp {} release-artifacts/ \;

      - name: Collect Linux artifacts
        if: matrix.os == 'blacksmith-2vcpu-ubuntu-2404'
        shell: bash
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/release/bundle -type f \( -name '*.deb' -o -name '*.AppImage' -o -name '*.AppImage.tar.gz' -o -name '*.rpm' -o -name '*.sig' \) -exec cp {} release-artifacts/ \;

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: release-artifacts/*
          if-no-files-found: error

  manifest-pages:
    name: release manifest and Pages
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release workflow requires a semantic version tag like v1.2.3; got ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

      - name: Sync version from tag
        shell: bash
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_VERSION#v}"
          echo "Syncing version to ${VERSION} from tag ${TAG_VERSION}"
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: downloaded-artifacts
          merge-multiple: true

      - name: Assemble Pages site
        shell: bash
        run: |
          rm -rf site-dist && mkdir -p site-dist/updates site-dist/downloads site-dist/releases/latest/download
          cp -R docs/public/. site-dist/
          cp downloaded-artifacts/* site-dist/downloads/
          (
            cd site-dist/downloads
            copy_alias() {
              source="$(find . -maxdepth 1 -type f -name "$1" -print -quit)"
              if [ -z "${source}" ]; then
                echo "Missing release artifact for alias ${2}: ${1}" >&2
                exit 1
              fi
              cp "${source}" "${2}"
            }
            copy_alias "*_universal.dmg" "GSD-Dashboard.dmg"
            copy_alias "*_x64_en-US.msi" "GSD-Dashboard.msi"
            copy_alias "*_x64-setup.exe" "GSD-Dashboard.exe"
            copy_alias "*_amd64.deb" "gsd-dashboard.deb"
            copy_alias "*.x86_64.rpm" "gsd-dashboard.rpm"
            copy_alias "*_amd64.AppImage" "gsd-dashboard.AppImage"
            for artifact in *; do
              if [ -f "${artifact}" ] && [[ "${artifact}" != *.sha256 ]]; then
                shasum -a 256 "${artifact}" > "${artifact}.sha256"
              fi
            done
            cp \
              GSD-Dashboard.dmg GSD-Dashboard.dmg.sha256 \
              GSD-Dashboard.msi GSD-Dashboard.msi.sha256 \
              GSD-Dashboard.exe GSD-Dashboard.exe.sha256 \
              gsd-dashboard.deb gsd-dashboard.deb.sha256 \
              gsd-dashboard.rpm gsd-dashboard.rpm.sha256 \
              gsd-dashboard.AppImage gsd-dashboard.AppImage.sha256 \
              ../releases/latest/download/
          )

      - name: Prepare release notes
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          {
            echo "GSD Dashboard release artifacts for macOS, Windows, and Linux."
            echo
            if [ -n "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
              echo "Signed artifacts: signing credentials were available."
            else
              echo "Unsigned artifact: signing credentials were not available."
            fi
          } > release-notes.md

      - name: Gate updater signing secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: scripts/release/assert-release-secrets.sh

      - name: Verify release config and build smoke
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npm ci
          npm run release:verify-tauri-config
          npm run build

      - name: Generate updater manifest
        env:
          GSD_DASHBOARD_BASE_URL: ${{ vars.GSD_DASHBOARD_BASE_URL }}
        shell: bash
        run: |
          base_url="${GSD_DASHBOARD_BASE_URL:-https://3rdprints.github.io/gsd-dashboard}"
          version="${GITHUB_REF_NAME#v}"
          node scripts/release/generate-updater-manifest.mjs \
            --version "${version}" \
            --release-url-base "${base_url%/}/downloads/" \
            --artifact-dir site-dist/downloads \
            --out site-dist/updates/latest.json
          node scripts/release/verify-updater-manifest.mjs site-dist/updates/latest.json

      - name: Verify Pages site
        run: node scripts/release/verify-pages-site.mjs site-dist/index.html site-dist/install.sh

      - name: Build source bundle
        run: scripts/release/build-source-bundle.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "${tag}" >/dev/null 2>&1 || gh release create "${tag}" --title "${tag}" --notes-file release-notes.md
          gh release upload "${tag}" \
            downloaded-artifacts/* \
            site-dist/downloads/*.sha256 \
            site-dist/releases/latest/download/GSD-Dashboard.dmg \
            site-dist/releases/latest/download/GSD-Dashboard.msi \
            site-dist/releases/latest/download/GSD-Dashboard.exe \
            site-dist/releases/latest/download/gsd-dashboard.deb \
            site-dist/releases/latest/download/gsd-dashboard.rpm \
            site-dist/releases/latest/download/gsd-dashboard.AppImage \
            site-dist/updates/latest.json \
            dist-release/gsd-dashboard-source-*.tar.gz \
            --clobber

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site-dist

      - name: Deploy Pages
        uses: actions/deploy-pages@v5
