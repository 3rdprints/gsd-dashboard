name: Import secrets and variables to Depot CI
on: push

permissions:
  id-token: write
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          unset DEPOT_TOKEN
          depot ci secrets add APPLE_CERTIFICATE="$APPLE_CERTIFICATE" APPLE_CERTIFICATE_PASSWORD="$APPLE_CERTIFICATE_PASSWORD" APPLE_ID="$APPLE_ID" APPLE_PASSWORD="$APPLE_PASSWORD" APPLE_SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY" APPLE_TEAM_ID="$APPLE_TEAM_ID" TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY" --repo horknfbr/gsd-dashboard
  variables:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import variables
        env:
          GSD_DASHBOARD_BASE_URL: ${{ vars.GSD_DASHBOARD_BASE_URL }}
        run: |
          unset DEPOT_TOKEN
          depot ci vars add GSD_DASHBOARD_BASE_URL="$GSD_DASHBOARD_BASE_URL" --repo horknfbr/gsd-dashboard
